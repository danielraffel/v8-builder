# build-v8.yml — build, seal, validate, and (optionally) release V8 per platform.
#
# macOS arm64 is PROVEN locally (sealed from-source V8 15.1 coexists with Skia/Dawn,
# identity gate PASS). Linux + Windows lanes are IMPLEMENTED here but validate ONLY on
# a real runner of that OS (GitHub-hosted or self-hosted Tart) — they are not provable
# on a macOS host. Do not treat a lane as validated until this workflow runs it green.
name: Build V8
on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: 'V8 milestone or exact tag (default: build the synced tip)'
        required: false
        type: string
      platforms:
        description: 'Comma-separated exact ids (mac/arm64,linux/x64,win/x64) or "all"'
        required: false
        default: 'all'
        type: string
      skia_release_tag:
        description: 'skia-builder release tag to validate coexistence against'
        required: true
        type: string
      skip_release:
        description: 'Skip creating a release'
        required: false
        default: true
        type: boolean
      force_github_runners:
        description: 'Force GitHub-hosted runners (ignore self-hosted vars for this run)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.v8_version }}-${{ inputs.platforms }}
  cancel-in-progress: false
permissions:
  contents: write

jobs:
  # ── Resolve runners ─────────────────────────────────────────────────────────────────
  # GitHub-hosted by DEFAULT so a fork builds with zero setup. If you have your own
  # (faster) runners, opt in by setting repo VARIABLES (Settings → Secrets and variables →
  # Actions → Variables) — no edits to this file:
  #   V8_MACOS_RUNS_ON_JSON        e.g. ["self-hosted","macOS","ARM64","v8-build"]
  #   V8_LINUX_ARM64_RUNS_ON_JSON  e.g. ["self-hosted","Linux","ARM64","v8-build-linux"]
  # Each is a JSON runs-on value (a "label" string or a labels array).
  #   • Unset → GitHub-hosted: macOS → macos-15; linux/arm64 → ubuntu-24.04, where it
  #     CROSS-compiles (host x64 → target arm64, no emulation — V8's bundled toolchain is
  #     x86_64-host and runs natively on an x64 host; build + seal-audit + strip are all
  #     cross-capable).
  #   • Set → use those runners. AUTO-FALLBACK to GitHub when the runner is offline requires
  #     an OPTIONAL `RUNNER_STATUS_TOKEN` secret (a PAT with Administration:read — the default
  #     GITHUB_TOKEN can't list runners). Without that PAT the configured runners are trusted;
  #     use the `force_github_runners` dispatch input to fall back to GitHub manually.
  resolve-runners:
    runs-on: ubuntu-24.04
    outputs:
      macos: ${{ steps.r.outputs.macos }}
      linux_arm64: ${{ steps.r.outputs.linux_arm64 }}
    steps:
      - id: r
        env:
          # OPTIONAL: a PAT with "Administration: read" enables the runner-ONLINE check +
          # auto-fallback (the default GITHUB_TOKEN cannot list self-hosted runners). Without
          # it, configured runners are TRUSTED — use the `force_github_runners` dispatch input
          # to fall back manually when they're down.
          STATUS_TOKEN: ${{ secrets.RUNNER_STATUS_TOKEN }}
          MAC_PREF: ${{ vars.V8_MACOS_RUNS_ON_JSON }}
          LARM_PREF: ${{ vars.V8_LINUX_ARM64_RUNS_ON_JSON }}
          FORCE_GH: ${{ inputs.force_github_runners }}
        run: |
          set -euo pipefail
          # No preference set (fork) → GitHub-hosted fallback, no API call.
          # force_github_runners=true → GitHub fallback (manual override, no PAT needed).
          # PAT set → route to self-hosted only if a matching runner is ONLINE, else fallback.
          # No PAT → trust the configured runners (can't query status without admin access).
          resolve() {
            pref="$1"; fallback="$2"
            [ -z "$pref" ] && { echo "$fallback"; return; }
            [ "${FORCE_GH:-}" = "true" ] && { echo "$fallback"; return; }
            [ -z "${STATUS_TOKEN:-}" ] && { echo "$pref"; return; }
            label="$(printf '%s' "$pref" | python3 -c 'import json,sys; a=json.load(sys.stdin); print(a[-1] if isinstance(a,list) else a)')"
            online="$(GH_TOKEN="$STATUS_TOKEN" gh api "repos/${{ github.repository }}/actions/runners" --paginate \
              --jq "[.runners[]|select(.status==\"online\" and (.labels|map(.name)|index(\"$label\")))]|length" 2>/dev/null || echo 0)"
            if [ "${online:-0}" -gt 0 ]; then echo "$pref"; else
              echo "::notice::self-hosted '$label' offline — falling back to GitHub-hosted $fallback"
              echo "$fallback"
            fi
          }
          MAC="$(resolve "${MAC_PREF:-}" '"macos-15"')"
          LARM="$(resolve "${LARM_PREF:-}" '"ubuntu-24.04"')"
          echo "macos=$MAC" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$LARM" >> "$GITHUB_OUTPUT"
          echo "resolved → macOS=$MAC  linux/arm64=$LARM"

  build-v8:
    needs: resolve-runners
    strategy:
      fail-fast: false
      matrix:
        include:
          # `cell` is the on-disk output id build-v8.py writes to (build/<cell>) and the
          # artifact name suffix. It equals <platform>-<arch> for every platform EXCEPT
          # iOS, which has a second axis (env) so its cell is ios-<env>-<arch>.
          - { os: macos-15,     platform: mac,   arch: arm64,  cell: mac-arm64,             build: 'mac -archs arm64' }
          - { os: macos-15,     platform: mac,   arch: x86_64, cell: mac-x86_64,            build: 'mac -archs x86_64' }
          - { os: ubuntu-24.04, platform: linux, arch: x64,    cell: linux-x64,             build: 'linux -archs x64' }
          - { os: ubuntu-24.04, platform: linux, arch: arm64,  cell: linux-arm64,           build: 'linux -archs arm64' }
          - { os: windows-2022, platform: win,   arch: x64,    cell: win-x64,               build: 'win -archs x64' }
          - { os: windows-2022, platform: win,   arch: arm64,  cell: win-arm64,             build: 'win -archs arm64' }
          - { os: ubuntu-24.04, platform: android, arch: arm64, cell: android-arm64,        build: 'android -archs arm64' }
          - { os: macos-15,     platform: ios,   arch: arm64,  cell: ios-simulator-arm64,   build: 'ios -archs arm64 --ios-env simulator' }
          # win/arm64 cross-builds on the x64 runner (clang-cl → arm64); its seal audit is
          # static, but the arm64 identity validator can't run on x64 — it runs on the local
          # arm64 Windows VM (win-local task). macOS x86_64/universal + Linux arm64: add next.
          # android/arm64 is a CROSS-compile from the x86_64-Linux runner (target_os=android,
          # host_cpu=x64): build + seal-audit + DT_NEEDED here; the arm64 identity exe runs on
          # an arm64 emulator/device (bundled into the artifact's validate/ for offline run).
          # No skia-builder android asset exists, so the coexistence proof is the seal +
          # DT_NEEDED audits (manifest coexistence=identity-only) — Skia download + cmake
          # validator are SKIPPED for android below.
          # ios/arm64 (simulator) cross-builds on the macOS self-hosted runner with the host
          # Xcode toolchain. It's jitless (target_os=ios ⇒ lite mode), produces a SEALED
          # dynamic V8.framework (Mach-O export-table seal via seal/macho.py), and SKIPS the
          # cmake coexistence harness: the macho seal audit is the coexistence guarantee, and
          # the Simulator Abseil-ODR gate was already proven GO on feature/ios-lane. Skia
          # download + cmake validator are SKIPPED for ios below (same shape as android/win).
    # Routing comes from the resolve-runners job above: macOS + linux/arm64 use your
    # self-hosted runners when configured AND online, else GitHub-hosted (macos-15 /
    # ubuntu-24.04). Everything else is always GitHub-hosted. See resolve-runners for the
    # opt-in repo variables.
    runs-on: ${{ (matrix.platform == 'linux' && matrix.arch == 'arm64') && fromJSON(needs.resolve-runners.outputs.linux_arm64) || (startsWith(matrix.os, 'macos') && fromJSON(needs.resolve-runners.outputs.macos)) || matrix.os }}
    steps:
      - name: Select (exact, not substring)
        id: sel
        shell: bash
        run: |
          P="${{ inputs.platforms }}"; ID="${{ matrix.platform }}/${{ matrix.arch }}"
          GO=false
          if [ "$P" = "all" ]; then GO=true; else
            IFS=','; for x in $P; do if [ "$x" = "$ID" ]; then GO=true; fi; done
          fi
          echo "go=$GO" >> "$GITHUB_OUTPUT"
          echo "selected $ID -> go=$GO"
      - if: steps.sel.outputs.go == 'true'
        uses: actions/checkout@v6
      - name: Set up Python (GitHub-hosted only; self-hosted uses system python3)
        # actions/setup-python needs the hosted-runner tool cache, which the self-hosted
        # Mac Studio runners don't provide — they already have a system python3. Skip it
        # there and let build-v8.py use `python3` directly.
        if: steps.sel.outputs.go == 'true' && runner.environment == 'github-hosted'
        uses: actions/setup-python@v6
        with: { python-version: '3.x' }
      - name: Free disk space (Linux)
        if: steps.sel.outputs.go == 'true' && runner.os == 'Linux'
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
      - name: Set up ccache (build-v8.py auto-enables cc_wrapper when ccache is in PATH)
        if: steps.sel.outputs.go == 'true'
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   sudo apt-get update -qq && sudo apt-get install -y -qq ccache ;;
            macOS)   brew list ccache >/dev/null 2>&1 || brew install ccache ;;
            Windows) choco install ccache -y --no-progress ;;
          esac
          # 4G holds a full V8 build's objects (ccache compresses ~2:1). GitHub's repo
          # cache budget is 10G (LRU-evicted), and each of the 3 platforms keeps its own
          # cache (key includes platform/arch), so 4G/platform fits ~2.5 platforms — the
          # one you're actively iterating stays warm; older platforms evict harmlessly.
          # CCACHE_DIR must be a path the NATIVE ccache.exe understands. On Windows,
          # git-bash's $(pwd) is an MSYS path (/d/a/...) that ccache.exe + actions/cache
          # don't agree on (→ "Cache not found", nothing cached). `pwd -W` gives the
          # native D:/a/... form, which matches actions/cache's ${{ github.workspace }}.
          if [ "$RUNNER_OS" = "Windows" ]; then CDIR="$(pwd -W)/.ccache"; else CDIR="$(pwd)/.ccache"; fi
          echo "CCACHE_DIR=$CDIR" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=4G" >> "$GITHUB_ENV"
          echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=time_macros,include_file_mtime,include_file_ctime" >> "$GITHUB_ENV"
      - name: Restore ccache (compiled objects — re-runs recompile only changed TUs)
        if: steps.sel.outputs.go == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ matrix.platform }}-${{ matrix.arch }}-${{ inputs.v8_version }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.platform }}-${{ matrix.arch }}-${{ inputs.v8_version }}-
            ccache-${{ matrix.platform }}-${{ matrix.arch }}-
      - name: Build + seal V8 (depot_tools/gn/ninja + export-table seal)
        if: steps.sel.outputs.go == 'true'
        shell: bash
        run: |
          python3 build-v8.py ${{ matrix.build }} ${{ inputs.v8_version && format('-tag {0}', inputs.v8_version) || '--use-synced' }}
          ccache --show-stats 2>/dev/null || true
      - name: Download matching Skia release (coexistence target)
        # mac/linux only. Windows self-validates identity via the gn target; Android has NO
        # skia-builder asset (skia-builder publishes no skia-build-android-*), so it validates
        # identity-only and treats the seal + DT_NEEDED audits as the coexistence guarantee.
        # iOS likewise skips the cmake coexistence harness — the macho seal audit is the
        # coexistence guarantee and the Simulator ODR gate was proven on feature/ios-lane.
        # All three skip the Skia coexistence harness.
        if: steps.sel.outputs.go == 'true' && runner.os != 'Windows' && matrix.platform != 'android' && matrix.platform != 'ios' && !(matrix.platform == 'linux' && matrix.arch == 'arm64')
        shell: bash
        run: |
          mkdir -p skia && cd skia
          gh release download "${{ inputs.skia_release_tag }}" --repo danielraffel/skia-builder \
            --pattern "*${{ matrix.platform }}*${{ matrix.arch }}*release*.zip"
          for z in *.zip; do unzip -o "$z"; done
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
      - name: Validate coexistence (forced-collision link + identity, NO skip-pass)
        # Windows self-validates IDENTITY inside build-v8.py (gn-target validator built
        # with V8's clang-cl + libc++ — the decided consumer contract); the cmake
        # coexistence harness here is mac/linux (system-ABI + Skia static archive).
        # Android is SKIPPED: no Android Skia artifact, and the cross-built arm64 exe can't
        # run on the x86_64 runner. build-v8.py runs the android identity validator (adb
        # when a device is reachable; otherwise it bundles exe+libv8.so into the artifact's
        # validate/ for an offline arm64-emulator run). Seal + DT_NEEDED audits gate here.
        # iOS is SKIPPED here too: it produces a sealed V8.framework whose macho seal audit
        # (run inside build-v8.py) is the coexistence guarantee; the Simulator Abseil-ODR
        # gate (validate/ios/run_ios_gate.py) was already proven GO on feature/ios-lane.
        if: steps.sel.outputs.go == 'true' && runner.os != 'Windows' && matrix.platform != 'android' && matrix.platform != 'ios' && !(matrix.platform == 'linux' && matrix.arch == 'arm64')
        shell: bash
        run: |
          # locate the dir holding Skia's static archives in the unzipped release.
          # ABSOLUTE path: cmake treats a RELATIVE foo/lib.a in target_link_libraries as a
          # library NAME and emits `-lfoo/lib.a` (ld can't find it). Resolve to absolute.
          SKIA_LIBDIR="$(cd "$(dirname "$(find skia -name 'libskunicode_icu.a' -o -name 'skunicode_icu.lib' | head -1)")" && pwd)"
          echo "SKIA_LIBDIR=$SKIA_LIBDIR"
          # macOS may cross-build a cell (x86_64 dylib on the arm64 runner). Pin the
          # validator's arch to the artifact's and run the x86_64 binary under Rosetta.
          EXTRA=(); PRE=()
          if [ "$RUNNER_OS" = "macOS" ]; then
            MARCH="${{ matrix.arch }}"; [ "$MARCH" = "x64" ] && MARCH="x86_64"
            EXTRA+=("-DCMAKE_OSX_ARCHITECTURES=$MARCH")
            if [ "$MARCH" = "x86_64" ] && [ "$(uname -m)" = "arm64" ]; then
              softwareupdate --install-rosetta --agree-to-license || true
              PRE=(arch -x86_64)
            fi
          fi
          cmake -S validate -B validate/build "${EXTRA[@]}" \
            -DV8_INCLUDE_DIR="$PWD/build/src/v8/include" \
            -DV8_LIBRARY_PATH="$PWD/$(ls build/${{ matrix.platform }}-${{ matrix.arch }}/lib/libv8.*)" \
            -DSKIA_DIR="$SKIA_LIBDIR" \
            -DEXPECTED_V8_VERSION="$(python3 -c "import json;print(json.load(open('build/${{ matrix.platform }}-${{ matrix.arch }}/manifest.json'))['v8_version'])")"
          cmake --build validate/build
          "${PRE[@]}" ./validate/build/v8_skia_validate
      - name: Upload artifact
        # Use matrix.cell, not <platform>-<arch>: iOS writes build/ios-<env>-<arch>
        # (e.g. build/ios-simulator-arm64) because it carries a second (env) axis. For the
        # other platforms cell == <platform>-<arch>, so this is identical to before.
        if: steps.sel.outputs.go == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: v8-${{ matrix.cell }}
          path: build/${{ matrix.cell }}

  validate-all:
    # Intra-repo single-V8-SHA gate (task #29): every per-platform artifact in a sweep
    # must name the SAME V8 build — no mixed-revision release. Runs on every multi-cell
    # dispatch (not just releases); release creation is additionally gated below.
    needs: build-v8
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with: { path: artifacts }
      - name: Single-SHA gate (no mixed-revision release)
        run: python3 tools/check_single_sha.py artifacts

  create-release:
    needs: validate-all
    if: ${{ !inputs.skip_release }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with: { path: artifacts }
      - name: Package per-platform zips + release notes
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ inputs.v8_version }}"
          if [ -z "$ver" ]; then
            ver="$(python3 -c "import json,glob;print(json.load(open(sorted(glob.glob('artifacts/**/manifest.json',recursive=True))[0]))['v8_version'])")"
          fi
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          mkdir -p release
          for d in artifacts/v8-*; do
            [ -d "$d" ] || continue
            name="$(basename "$d")"                 # v8-<platform>-<arch>
            # validate/ is the android + win-arm64 offline harness (cross-built validator
            # + a co-located lib copy). It rides along in the UPLOADED artifact so the
            # separate emulator/VM validation step can run it AFTER the build — but a
            # release consumer never needs it, and it duplicates the shipped lib. Exclude
            # it (and any stray macOS metadata) from the release zip so each artifact
            # contains ONLY the lean, required entries.
            ( cd "$d" && zip -qr "$GITHUB_WORKSPACE/release/${name}-${ver}.zip" . \
                -x 'validate/*' -x '*/.DS_Store' -x '__MACOSX/*' )
          done
          python3 - "$ver" > release/RELEASE_NOTES.md <<'PY'
          import json, glob, sys
          ver = sys.argv[1]
          ms = sorted(glob.glob('artifacts/**/manifest.json', recursive=True))
          print(f"**V8 {ver}** — a sealed, embeddable, shared V8 that coexists with "
                f"Skia/Dawn (exports only `v8::`/`cppgc::`; ICU/zlib/Abseil kept internal). "
                f"`Intl` on. See the README for the ABI/consumer contract.\n")
          print("| platform | arch | v8 | sealed | Skia pair (validated against) |")
          print("|---|---|---|---|---|")
          for m in ms:
              d = json.load(open(m)); p = d.get("pair", {}) or {}
              skia = p.get("skia") or p.get("skia_release") or "—"
              plat = d.get('platform')
              # iOS carries an env axis (device|simulator) and validates via the macho seal
              # audit + Simulator ODR gate, not the Skia cmake harness — surface both.
              if plat == 'ios':
                  plat = f"ios ({d.get('ios_environment', '?')})"
                  skia = 'seal+ODR gate'
              print(f"| {plat} | {d.get('arch')} | {d.get('v8_version')} | "
                    f"{'yes' if d.get('sealed') else 'NO'} | {skia} |")
          print("\nEvery artifact in this release names the same V8 revision "
                "(single-SHA gate). Each is build + seal-audited (0 ICU/zlib/Abseil "
                "exports) + identity-checked (no skip-pass).")
          PY
          cat release/RELEASE_NOTES.md
          ls -la release/
      - name: Create / update GitHub release
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.pkg.outputs.ver }}"
          tag="v8-${ver}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" release/*.zip --repo "${{ github.repository }}" --clobber
            gh release edit "$tag" --repo "${{ github.repository }}" --notes-file release/RELEASE_NOTES.md
          else
            gh release create "$tag" --repo "${{ github.repository }}" \
              --title "V8 ${ver}" \
              --notes-file release/RELEASE_NOTES.md \
              release/*.zip
          fi
          gh release view "$tag" --repo "${{ github.repository }}" --json tagName,assets \
            --jq '{tag:.tagName, assets:[.assets[].name]}'
