# build-v8.yml — build, seal, validate, and (optionally) release V8 per platform.
#
# macOS arm64 is PROVEN locally (sealed from-source V8 15.1 coexists with Skia/Dawn,
# identity gate PASS). Linux + Windows lanes are IMPLEMENTED here but validate ONLY on
# a real runner of that OS (GitHub-hosted or self-hosted Tart) — they are not provable
# on a macOS host. Do not treat a lane as validated until this workflow runs it green.
name: Build V8
on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: 'V8 milestone or exact tag (default: build the synced tip)'
        required: false
        type: string
      platforms:
        description: 'Comma-separated exact ids (mac/arm64,linux/x64,win/x64) or "all"'
        required: false
        default: 'all'
        type: string
      skia_release_tag:
        description: 'skia-builder release tag to validate coexistence against'
        required: true
        type: string
      skip_release:
        description: 'Skip creating a release'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.v8_version }}-${{ inputs.platforms }}
  cancel-in-progress: false
permissions:
  contents: write

jobs:
  build-v8:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-15,     platform: mac,   arch: arm64,  build: 'mac -archs arm64' }
          - { os: macos-15,     platform: mac,   arch: x86_64, build: 'mac -archs x86_64' }
          - { os: ubuntu-24.04, platform: linux, arch: x64,    build: 'linux -archs x64' }
          - { os: windows-2022, platform: win,   arch: x64,    build: 'win -archs x64' }
          - { os: windows-2022, platform: win,   arch: arm64,  build: 'win -archs arm64' }
          - { os: ubuntu-24.04, platform: android, arch: arm64, build: 'android -archs arm64' }
          # win/arm64 cross-builds on the x64 runner (clang-cl → arm64); its seal audit is
          # static, but the arm64 identity validator can't run on x64 — it runs on the local
          # arm64 Windows VM (win-local task). macOS x86_64/universal + Linux arm64: add next.
          # android/arm64 is a CROSS-compile from the x86_64-Linux runner (target_os=android,
          # host_cpu=x64): build + seal-audit + DT_NEEDED here; the arm64 identity exe runs on
          # an arm64 emulator/device (bundled into the artifact's validate/ for offline run).
          # No skia-builder android asset exists, so the coexistence proof is the seal +
          # DT_NEEDED audits (manifest coexistence=identity-only) — Skia download + cmake
          # validator are SKIPPED for android below.
    runs-on: ${{ matrix.os }}
    steps:
      - name: Select (exact, not substring)
        id: sel
        shell: bash
        run: |
          P="${{ inputs.platforms }}"; ID="${{ matrix.platform }}/${{ matrix.arch }}"
          GO=false
          if [ "$P" = "all" ]; then GO=true; else
            IFS=','; for x in $P; do if [ "$x" = "$ID" ]; then GO=true; fi; done
          fi
          echo "go=$GO" >> "$GITHUB_OUTPUT"
          echo "selected $ID -> go=$GO"
      - if: steps.sel.outputs.go == 'true'
        uses: actions/checkout@v6
      - if: steps.sel.outputs.go == 'true'
        uses: actions/setup-python@v6
        with: { python-version: '3.x' }
      - name: Free disk space (Linux)
        if: steps.sel.outputs.go == 'true' && runner.os == 'Linux'
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
      - name: Set up ccache (build-v8.py auto-enables cc_wrapper when ccache is in PATH)
        if: steps.sel.outputs.go == 'true'
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   sudo apt-get update -qq && sudo apt-get install -y -qq ccache ;;
            macOS)   brew list ccache >/dev/null 2>&1 || brew install ccache ;;
            Windows) choco install ccache -y --no-progress ;;
          esac
          # 4G holds a full V8 build's objects (ccache compresses ~2:1). GitHub's repo
          # cache budget is 10G (LRU-evicted), and each of the 3 platforms keeps its own
          # cache (key includes platform/arch), so 4G/platform fits ~2.5 platforms — the
          # one you're actively iterating stays warm; older platforms evict harmlessly.
          # CCACHE_DIR must be a path the NATIVE ccache.exe understands. On Windows,
          # git-bash's $(pwd) is an MSYS path (/d/a/...) that ccache.exe + actions/cache
          # don't agree on (→ "Cache not found", nothing cached). `pwd -W` gives the
          # native D:/a/... form, which matches actions/cache's ${{ github.workspace }}.
          if [ "$RUNNER_OS" = "Windows" ]; then CDIR="$(pwd -W)/.ccache"; else CDIR="$(pwd)/.ccache"; fi
          echo "CCACHE_DIR=$CDIR" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=4G" >> "$GITHUB_ENV"
          echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=time_macros,include_file_mtime,include_file_ctime" >> "$GITHUB_ENV"
      - name: Restore ccache (compiled objects — re-runs recompile only changed TUs)
        if: steps.sel.outputs.go == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ matrix.platform }}-${{ matrix.arch }}-${{ inputs.v8_version }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.platform }}-${{ matrix.arch }}-${{ inputs.v8_version }}-
            ccache-${{ matrix.platform }}-${{ matrix.arch }}-
      - name: Build + seal V8 (depot_tools/gn/ninja + export-table seal)
        if: steps.sel.outputs.go == 'true'
        shell: bash
        run: |
          python3 build-v8.py ${{ matrix.build }} ${{ inputs.v8_version && format('-tag {0}', inputs.v8_version) || '--use-synced' }}
          ccache --show-stats 2>/dev/null || true
      - name: Download matching Skia release (coexistence target)
        # mac/linux only. Windows self-validates identity via the gn target; Android has NO
        # skia-builder asset (skia-builder publishes no skia-build-android-*), so it validates
        # identity-only and treats the seal + DT_NEEDED audits as the coexistence guarantee.
        # Both skip the Skia coexistence harness.
        if: steps.sel.outputs.go == 'true' && runner.os != 'Windows' && matrix.platform != 'android'
        shell: bash
        run: |
          mkdir -p skia && cd skia
          gh release download "${{ inputs.skia_release_tag }}" --repo danielraffel/skia-builder \
            --pattern "*${{ matrix.platform }}*${{ matrix.arch }}*release*.zip"
          for z in *.zip; do unzip -o "$z"; done
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
      - name: Validate coexistence (forced-collision link + identity, NO skip-pass)
        # Windows self-validates IDENTITY inside build-v8.py (gn-target validator built
        # with V8's clang-cl + libc++ — the decided consumer contract); the cmake
        # coexistence harness here is mac/linux (system-ABI + Skia static archive).
        # Android is SKIPPED: no Android Skia artifact, and the cross-built arm64 exe can't
        # run on the x86_64 runner. build-v8.py runs the android identity validator (adb
        # when a device is reachable; otherwise it bundles exe+libv8.so into the artifact's
        # validate/ for an offline arm64-emulator run). Seal + DT_NEEDED audits gate here.
        if: steps.sel.outputs.go == 'true' && runner.os != 'Windows' && matrix.platform != 'android'
        shell: bash
        run: |
          # locate the dir holding Skia's static archives in the unzipped release.
          # ABSOLUTE path: cmake treats a RELATIVE foo/lib.a in target_link_libraries as a
          # library NAME and emits `-lfoo/lib.a` (ld can't find it). Resolve to absolute.
          SKIA_LIBDIR="$(cd "$(dirname "$(find skia -name 'libskunicode_icu.a' -o -name 'skunicode_icu.lib' | head -1)")" && pwd)"
          echo "SKIA_LIBDIR=$SKIA_LIBDIR"
          # macOS may cross-build a cell (x86_64 dylib on the arm64 runner). Pin the
          # validator's arch to the artifact's and run the x86_64 binary under Rosetta.
          EXTRA=(); PRE=()
          if [ "$RUNNER_OS" = "macOS" ]; then
            MARCH="${{ matrix.arch }}"; [ "$MARCH" = "x64" ] && MARCH="x86_64"
            EXTRA+=("-DCMAKE_OSX_ARCHITECTURES=$MARCH")
            if [ "$MARCH" = "x86_64" ] && [ "$(uname -m)" = "arm64" ]; then
              softwareupdate --install-rosetta --agree-to-license || true
              PRE=(arch -x86_64)
            fi
          fi
          cmake -S validate -B validate/build "${EXTRA[@]}" \
            -DV8_INCLUDE_DIR="$PWD/build/src/v8/include" \
            -DV8_LIBRARY_PATH="$PWD/$(ls build/${{ matrix.platform }}-${{ matrix.arch }}/lib/libv8.*)" \
            -DSKIA_DIR="$SKIA_LIBDIR" \
            -DEXPECTED_V8_VERSION="$(python3 -c "import json;print(json.load(open('build/${{ matrix.platform }}-${{ matrix.arch }}/manifest.json'))['v8_version'])")"
          cmake --build validate/build
          "${PRE[@]}" ./validate/build/v8_skia_validate
      - name: Upload artifact
        if: steps.sel.outputs.go == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: v8-${{ matrix.platform }}-${{ matrix.arch }}
          path: build/${{ matrix.platform }}-${{ matrix.arch }}

  validate-all:
    # Intra-repo single-V8-SHA gate (task #29): every per-platform artifact in a sweep
    # must name the SAME V8 build — no mixed-revision release. Runs on every multi-cell
    # dispatch (not just releases); release creation is additionally gated below.
    needs: build-v8
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with: { path: artifacts }
      - name: Single-SHA gate (no mixed-revision release)
        run: python3 tools/check_single_sha.py artifacts

  create-release:
    needs: validate-all
    if: ${{ !inputs.skip_release }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with: { path: artifacts }
      - name: Package per-platform zips + release notes
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ inputs.v8_version }}"
          if [ -z "$ver" ]; then
            ver="$(python3 -c "import json,glob;print(json.load(open(sorted(glob.glob('artifacts/**/manifest.json',recursive=True))[0]))['v8_version'])")"
          fi
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          mkdir -p release
          for d in artifacts/v8-*; do
            [ -d "$d" ] || continue
            name="$(basename "$d")"                 # v8-<platform>-<arch>
            ( cd "$d" && zip -qr "$GITHUB_WORKSPACE/release/${name}-${ver}.zip" . )
          done
          python3 - "$ver" > release/RELEASE_NOTES.md <<'PY'
          import json, glob, sys
          ver = sys.argv[1]
          ms = sorted(glob.glob('artifacts/**/manifest.json', recursive=True))
          print(f"**V8 {ver}** — a sealed, embeddable, shared V8 that coexists with "
                f"Skia/Dawn (exports only `v8::`/`cppgc::`; ICU/zlib/Abseil kept internal). "
                f"`Intl` on. See the README for the ABI/consumer contract.\n")
          print("| platform | arch | v8 | sealed | Skia pair (validated against) |")
          print("|---|---|---|---|---|")
          for m in ms:
              d = json.load(open(m)); p = d.get("pair", {}) or {}
              skia = p.get("skia") or p.get("skia_release") or "—"
              print(f"| {d.get('platform')} | {d.get('arch')} | {d.get('v8_version')} | "
                    f"{'yes' if d.get('sealed') else 'NO'} | {skia} |")
          print("\nEvery artifact in this release names the same V8 revision "
                "(single-SHA gate). Each is build + seal-audited (0 ICU/zlib/Abseil "
                "exports) + identity-checked (no skip-pass).")
          PY
          cat release/RELEASE_NOTES.md
          ls -la release/
      - name: Create / update GitHub release
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.pkg.outputs.ver }}"
          tag="v8-${ver}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" release/*.zip --repo "${{ github.repository }}" --clobber
            gh release edit "$tag" --repo "${{ github.repository }}" --notes-file release/RELEASE_NOTES.md
          else
            gh release create "$tag" --repo "${{ github.repository }}" \
              --title "V8 ${ver} (sealed, Skia/Dawn-coexisting)" \
              --notes-file release/RELEASE_NOTES.md \
              release/*.zip
          fi
          gh release view "$tag" --repo "${{ github.repository }}" --json tagName,assets \
            --jq '{tag:.tagName, assets:[.assets[].name]}'
